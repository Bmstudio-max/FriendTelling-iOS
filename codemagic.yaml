workflows:
  ios-distribution:
    name: FriendTelling iOS Distribution
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bmstudio.friendtelling
      vars:
        APP_STORE_APPLE_ID: 6745678901
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "FriendTelling.xcworkspace" \
            --scheme "FriendTelling"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
